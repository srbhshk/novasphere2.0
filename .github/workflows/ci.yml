# Continuous integration: required checks for merge (enable branch protection
# on `main` in GitHub: Settings → Branches → Add rule → require this workflow).

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    environment: deployment
    timeout-minutes: 30
    permissions:
      contents: read
    env:
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.14.0'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify (build, typecheck, lint, test)
        run: |
          export BETTER_AUTH_SECRET="${BETTER_AUTH_SECRET:-change-me-in-production-min-32-chars}"
          pnpm verify

      - name: Check formatting
        run: pnpm format:check

  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: deployment
    permissions:
      contents: read
    env:
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Host env must be non-empty for compose → Docker build-args. Fork PRs do not receive
      # secrets; `${VAR:-default}` in docker-compose.yml can still yield an empty build-arg in
      # some cases, so we coerce here and rely on Dockerfile fallback as well.
      - name: Build Compose services
        run: |
          export BETTER_AUTH_SECRET="${BETTER_AUTH_SECRET:-change-me-in-production-min-32-chars}"
          docker compose build
